@switch (category()) {
  @case ('Snack') {
    <svg viewBox="0 0 64 64" class="icon snack">
      <circle cx="32" cy="32" r="30" fill="url(#snackGrad)" />
      <circle cx="32" cy="32" r="22" fill="none" stroke="#fff" stroke-width="2.5" />
      <circle cx="32" cy="32" r="14" fill="none" stroke="#fff" stroke-width="2" />
      <circle cx="32" cy="32" r="6" fill="none" stroke="#fff" stroke-width="1.5" />
      <circle cx="32" cy="32" r="2" fill="#fff" />
      <defs>
        <linearGradient id="snackGrad" x1="0" y1="0" x2="64" y2="64">
          <stop offset="0%" stop-color="#D4A373" />
          <stop offset="100%" stop-color="#E8994A" />
        </linearGradient>
      </defs>
    </svg>
  }
  @case ('Refuel Meal') {
    <svg viewBox="0 0 64 64" class="icon refuel">
      <circle cx="32" cy="32" r="30" fill="url(#refuelGrad)" />
      <ellipse cx="32" cy="28" rx="14" ry="10" fill="none" stroke="#fff" stroke-width="2.5" />
      <path d="M22 38 L22 42 M32 38 L32 44 M42 38 L42 42" stroke="#fff" stroke-width="2" stroke-linecap="round" />
      <path d="M26 22 Q32 16 38 22" fill="none" stroke="#fff" stroke-width="2" />
      <defs>
        <linearGradient id="refuelGrad" x1="0" y1="0" x2="64" y2="64">
          <stop offset="0%" stop-color="#E86A33" />
          <stop offset="100%" stop-color="#C4552A" />
        </linearGradient>
      </defs>
    </svg>
  }
  @default {
    <svg viewBox="0 0 64 64" class="icon general">
      <circle cx="32" cy="32" r="30" fill="url(#generalGrad)" />
      <circle cx="32" cy="27" r="12" fill="none" stroke="#fff" stroke-width="2.5" />
      <path d="M20 40 L20 48 M44 40 L44 48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
      <ellipse cx="32" cy="47" rx="12" ry="3" fill="none" stroke="#fff" stroke-width="2" />
      <defs>
        <linearGradient id="generalGrad" x1="0" y1="0" x2="64" y2="64">
          <stop offset="0%" stop-color="#4A7C59" />
          <stop offset="100%" stop-color="#2D5A3D" />
        </linearGradient>
      </defs>
    </svg>
  }
}
