<header class="app-header">
  <div class="header-inner">
    <div class="logo" (click)="navigate('/recipes')">
      <span class="logo-icon">🍽️</span>
      <span class="logo-text">MealPlanner</span>
    </div>

    <nav class="tabs" role="tablist">
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="isActive('recipes')"
        class="tab"
        [class.tab--active]="isActive('recipes')"
        (click)="navigate('/recipes')"
      >
        Recipes
      </button>

      <button
        type="button"
        role="tab"
        [attr.aria-selected]="isActive('plan')"
        class="tab"
        [class.tab--active]="isActive('plan')"
        (click)="navigate('/plan')"
      >
        Plan
        @if (mealPlanService.totalMeals() > 0) {
          <span class="badge">{{ mealPlanService.totalMeals() }}</span>
        }
      </button>

      <button
        type="button"
        role="tab"
        [attr.aria-selected]="isActive('list')"
        class="tab"
        [class.tab--active]="isActive('list')"
        (click)="navigate('/list')"
      >
        List
        @if (mealPlanService.totalMeals() > 0) {
          <span class="badge">{{ mealPlanService.totalMeals() }}</span>
        }
      </button>
    </nav>

    <button
      type="button"
      class="theme-toggle"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.title]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      @if (themeService.theme() === 'dark') {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>
</header>
