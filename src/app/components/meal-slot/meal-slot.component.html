<div class="meal-slot">
  <div class="slot-header">
    <span class="slot-label">{{ label }}</span>
  </div>

  @if (entries().length === 0) {
    <button type="button" class="add-btn" (click)="onAdd()">
      <span class="add-icon">+</span>
      <span>Add meal</span>
    </button>
  }

  @for (entry of entries(); track entry.id) {
    <div class="meal-entry">
      <div class="meal-entry__name">Recipe #{{ entry.recipeId }}</div>
      <div class="meal-entry__controls">
        <input
          type="number"
          class="servings-input"
          [value]="entry.servings"
          (change)="onServingsChange(entry.id, $event)"
          min="1"
          max="50"
          aria-label="Servings"
        />
        <button type="button" class="remove-btn" (click)="onRemove(entry.id)" aria-label="Remove meal">
          &times;
        </button>
      </div>
    </div>
  }
</div>
